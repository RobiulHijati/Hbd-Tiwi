<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Zagi ❤️</title>

  <!-- Meta Preview -->
  <meta property="og:title" content="Untuk Zagi ❤️" />
  <meta property="og:description" content="From Rabull ❤️" />
  <meta property="og:image" content="images/zagi1.jpg" />
  <meta property="og:url" content="https://namadomainkamu.com" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Untuk Zagi ❤️" />
  <meta name="twitter:description" content="From Rabull ❤️" />
  <meta name="twitter:image" content="images/zagi1.jpg" />

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Lobster&family=Dancing+Script&display=swap");

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      text-align: center;
      position: relative;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      z-index: 2;
    }

    h1 {
      color: white;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      text-shadow: 0 0 15px rgba(255,255,255,.8);
    }

    .profile-pic {
      width: 220px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,.3);
    }

    button {
      padding: 15px 35px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg,#ff416c,#ff4b2b);
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: .3s;
    }

    button:hover {
      transform: scale(1.08);
    }

    .message {
      display: none;
      font-family: "Lobster", cursive;
      font-size: clamp(2rem,5vw,3.2rem);
      color: white;
      text-shadow: 0 0 15px red;
      animation: glow 1.5s infinite alternate;
    }

    .sub-message {
      display: none;
      color: white;
      font-size: 22px;
      font-family: "Dancing Script", cursive;
      width: 90%;
      line-height: 1.6;
      text-shadow: 0 0 8px rgba(255,255,255,.8);
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #ff416c;
      }
      to {
        text-shadow: 0 0 25px red;
      }
    }

    .heart {
      position: absolute;
      top: -20px;
      color: red;
      animation: fall linear forwards;
      z-index: 1;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<div class="container">

    <h1>Hai Zagi Sayang ❤️</h1>

    <img src="images/zagi1.jpg" alt="Zagi" class="profile-pic">

    <button onclick="showLove()">Klik Aku ❤️</button>

    <div class="message" id="loveMessage"></div>

    <div class="sub-message" id="subMessage"></div>

</div>

<audio id="loveSong" src="music/perfect.mp3" loop></audio>

<script>

const song = document.getElementById("loveSong");
song.volume = 0.5;

function showLove(){

    song.currentTime = 0;
    song.play();

    const msg=document.getElementById("loveMessage");
    const sub=document.getElementById("subMessage");

    msg.innerHTML="";
    msg.style.display="block";
    sub.style.display="none";

    const text="❤️ I LOVE YOU ZAGI ❤️";

    let i=0;

    function type(){

        if(i<text.length){

            msg.innerHTML+=text.charAt(i);

            i++;

            setTimeout(type,120);

        }else{

            setTimeout(()=>{

                sub.innerHTML=
                `Terima kasih ya sayang sudah hadir di hidupku. ❤️<br><br>

                Semoga kamu selalu sehat, selalu bahagia, dan semua impianmu bisa tercapai. Aku akan selalu mendukung setiap langkahmu.<br><br>

                Jangan pernah ragu sama kita ya. Aku bersyukur bisa mengenal kamu, bisa ketawa bareng kamu, dan semoga kita bisa terus bersama sampai kapan pun. 🤍<br><br>

                I Love You So Much, Zagi. ❤️🫶`;

                sub.style.display="block";

                Swal.fire({

                    title:"❤️ Untuk Zagi ❤️",

                    html:`
                    <div style="line-height:1.6">
                    Terima kasih sudah menjadi bagian terindah dalam hidupku.<br><br>

                    Semoga hubungan kita selalu diberi kebahagiaan, kesabaran, dan umur panjang untuk saling menemani.<br><br>

                    Aku akan selalu ada buat kamu, dalam keadaan apa pun.<br><br>

                    <b>I Love You Forever ❤️</b>
                    </div>
                    `,

                    imageUrl:"https://www.gambaranimasi.org/data/media/50/animasi-bergerak-bunga-kembang-0020.gif",

                    imageWidth:150,

                    imageHeight:150,

                    background:"#ffe6eb",

                    confirmButtonColor:"#ff4b2b",

                    confirmButtonText:"❤️ Aku Juga Sayang Kamu ❤️"

                });

            },500);

        }

    }

    type();

    startHearts();

}

function startHearts(){

    function createHeart(){

        const heart=document.createElement("div");

        heart.className="heart";

        heart.innerHTML="❤️";

        heart.style.left=Math.random()*100+"vw";

        heart.style.fontSize=(20+Math.random()*30)+"px";

        heart.style.animationDuration=(3+Math.random()*3)+"s";

        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),6000);

        setTimeout(createHeart,150);

    }

    createHeart();

}

</script>

</body>
</html>
